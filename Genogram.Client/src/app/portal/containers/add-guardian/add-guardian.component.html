<div class="diaglogbox container">
  <h2 mat-dialog-title>Add New Relationship</h2>
  <div class="form-elements">
    <mat-dialog-content>
      <form [formGroup]="form">
        <div class="row">
          <div class="col-lg-6">
            <mat-form-field class="full-width">
              <mat-label>First Name</mat-label>
              <input matInput formControlName="firstName" />
              <mat-error *ngIf="form.get('firstName')?.hasError('required')">
                First Name is required
              </mat-error>
            </mat-form-field>
          </div>

          <div class="col-lg-6">
            <mat-form-field class="full-width">
              <mat-label>Last Name</mat-label>
              <input matInput formControlName="lastName" />
              <mat-error *ngIf="form.get('lastName')?.hasError('required')">
                Last Name is required
              </mat-error>
            </mat-form-field>
          </div>
        </div>
        <div class="row">
          <div class="col-lg-6">

            <mat-form-field class="full-width">
              <mat-label>Relationship</mat-label>
              <mat-select formControlName="relationshipType">
                <mat-option *ngFor="let relationship of relationshipTypes" [value]="relationship"
                  [disabled]="isOptionDisabled(relationship)">
                  {{ relationship }}
                </mat-option>
              </mat-select>
              <mat-error *ngIf="form.get('relationshipType')?.hasError('required')">
                Relationship is required
              </mat-error>
            </mat-form-field>
          </div>

          <div class="col-lg-6">
            <mat-form-field class="full-width">
              <mat-label>Email</mat-label>
              <input matInput type="email" formControlName="email" />
              <mat-error *ngIf="form.get('email')?.hasError('required')">
                Email is required
              </mat-error>
              <mat-error *ngIf="form.get('email')?.hasError('email')">
                Please enter a valid email
              </mat-error>
            </mat-form-field>
          </div>
        </div>
        <div class="row">
          <div class="col-lg-6">
            <mat-form-field class="full-width">
              <mat-label>Phone Number</mat-label>
              <input matInput formControlName="phoneNumber" />
              <mat-error *ngIf="form.get('phoneNumber')?.hasError('required')">
                Phone Number is required
              </mat-error>
            </mat-form-field>
          </div>
          <div class="row">
            <div class="col-md-6 d-flex align-items-center">
              <mat-checkbox formControlName="isPrimaryContact">
                Primary Contact
              </mat-checkbox>
            </div>
          </div>
        </div>
      </form>
    </mat-dialog-content>
  </div>

  <mat-dialog-actions class="row g-3" >
    <div class="col-md-6">
      <button mat-raised-button class="btn btn-secondary w-100" (click)="onCancel()">Cancel</button>
    </div>
    <div class="col-md-6">
      <button mat-raised-button class="btn btn-primary w-100" (click)="onSubmit()" [disabled]="form.invalid">
        Submit
      </button>
    </div>
  </mat-dialog-actions>
</div>
