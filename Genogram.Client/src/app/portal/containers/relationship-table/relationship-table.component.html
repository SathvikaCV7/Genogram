<div class="button-group">
    <button mat-raised-button color="primary" (click)="onAdd()">Add</button>
    <button mat-raised-button color="accent" (click)="onGenogram()">Genogram</button>
  </div>
<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

    <!-- First Name Column -->
    <ng-container matColumnDef="firstName">
      <th mat-header-cell *matHeaderCellDef> First Name </th>
      <td mat-cell *matCellDef="let element"> {{element.firstName}} </td>
    </ng-container>
  
    <!-- Last Name Column -->
    <ng-container matColumnDef="lastName">
      <th mat-header-cell *matHeaderCellDef> Last Name </th>
      <td mat-cell *matCellDef="let element"> {{element.lastName}} </td>
    </ng-container>
  
    <!-- Relationship Column -->
    <ng-container matColumnDef="relationship">
      <th mat-header-cell *matHeaderCellDef> Relationship </th>
      <td mat-cell *matCellDef="let element"> {{element.relationship}} </td>
    </ng-container>
  
    <!-- Phone Number Column -->
    <ng-container matColumnDef="phone">
      <th mat-header-cell *matHeaderCellDef> Phone Number </th>
      <td mat-cell *matCellDef="let element"> {{element.phone}} </td>
    </ng-container>
  
    <!-- Mail Column -->
    <ng-container matColumnDef="mail">
      <th mat-header-cell *matHeaderCellDef> Mail </th>
      <td mat-cell *matCellDef="let element"> {{element.mail}} </td>
    </ng-container>
  
    <!-- Mail Contact Column -->
    <ng-container matColumnDef="mailContact">
      <th mat-header-cell *matHeaderCellDef> Mail Contact </th>
      <td mat-cell *matCellDef="let element"> 
        <mat-checkbox [checked]="element.mailContact"></mat-checkbox>
      </td>
    </ng-container>
  
    <!-- Remarks Column -->
    <ng-container matColumnDef="remarks">
      <th mat-header-cell *matHeaderCellDef> Remarks </th>
      <td mat-cell *matCellDef="let element"> {{element.remarks}} </td>
    </ng-container>
  
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
