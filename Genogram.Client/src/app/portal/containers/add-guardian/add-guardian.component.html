<div class="diaglogbox">
<h2 mat-dialog-title>Add New Relationship</h2>
<div class="form-elements">
<mat-dialog-content >

  <form [formGroup]="form">
    <mat-form-field class="full-width">
      <mat-label>First Name</mat-label>
      <input matInput formControlName="firstName" />
      <mat-error *ngIf="form.get('firstName')?.hasError('required')">
        First Name is required
      </mat-error>
    </mat-form-field>

    <mat-form-field class="full-width">
      <mat-label>Last Name</mat-label>
      <input matInput formControlName="lastName" />
      <mat-error *ngIf="form.get('lastName')?.hasError('required')">
        Last Name is required
      </mat-error>
    </mat-form-field>

    <mat-form-field class="full-width">
        <mat-label>Relationship</mat-label>
        <mat-select formControlName="relationshipType">
          <mat-option
            *ngFor="let relationship of relationshipTypes"
            [value]="relationship"
            [disabled]="isOptionDisabled(relationship)">
            {{ relationship }}
          </mat-option>
        </mat-select>
        <mat-error *ngIf="form.get('relationshipType')?.hasError('required')">
          Relationship is required
        </mat-error>
      </mat-form-field>
      

    <mat-form-field class="full-width">
      <mat-label>Email</mat-label>
      <input matInput type="email" formControlName="email" />
      <mat-error *ngIf="form.get('email')?.hasError('required')">
        Email is required
      </mat-error>
      <mat-error *ngIf="form.get('email')?.hasError('email')">
        Please enter a valid email
      </mat-error>
    </mat-form-field>

    <mat-form-field class="full-width">
        <mat-label>Phone Number</mat-label>
        <input matInput formControlName="phoneNumber" />
        <mat-error *ngIf="form.get('phoneNumber')?.hasError('required')">
          Phone Number is required
        </mat-error>
      </mat-form-field>

    <mat-checkbox formControlName="isPrimaryContact">
      Primary Contact
    </mat-checkbox>
  </form>
</mat-dialog-content>
</div>
<mat-dialog-actions align="end">
  <button mat-raised-button color="accent" (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="accent" (click)="onSubmit()" [disabled]="form.invalid">Submit</button>
</mat-dialog-actions>
</div>
